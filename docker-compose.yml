version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: demobanking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bankadmin
      POSTGRES_PASSWORD: bankpass123
      POSTGRES_DB: demobankingdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankadmin -d demobankingdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: demobanking-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bankadmin:bankpass123@postgres:5432/demobankingdb
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: demobanking-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
