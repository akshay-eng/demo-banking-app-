apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: banking-demo
  labels:
    app: postgres
    tier: database
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  # ClusterIP — only accessible within the cluster
  type: ClusterIP
  clusterIP: None   # Headless — StatefulSet DNS: postgres-0.postgres.banking-demo.svc.cluster.local
