apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: banking-demo
  labels:
    app: frontend
    tier: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
      annotations:
        instana.io/service-name: "banking-frontend"
        instana.io/custom-tags: "tier=web,env=demo,app=banking"
    spec:
      containers:
        - name: frontend
          # Build: docker build -t demobanking-frontend ./frontend
          # Push:  docker tag demobanking-frontend:latest ak3hay/demobanking-frontend:latest
          #        docker push ak3hay/demobanking-frontend:latest
          image: ak3hay/demobanking-frontend:latest
          # Always, not IfNotPresent — this now pulls from a real registry
          # tagged :latest, so a stale local cache must never win over a
          # fresh push. IfNotPresent silently keeps old content otherwise.
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
